# ============================================================
# Nginx 配置文件 — Vue SPA 生产环境
# 特性：History 路由回退、Gzip 压缩、静态资源长缓存、安全头
# ============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 访问日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # 性能优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip 压缩：减少传输体积，提升首屏加载速度
    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    server {
        listen       80;
        server_name  localhost;
        root         /usr/share/nginx/html;
        index        index.html;

        # ---------- Security Headers ----------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # ---------- SPA 路由回退 ----------
        # Vue Router 使用 History 模式，刷新非首页路径时需回退到 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---------- 静态资源长缓存 ----------
        # 带 hash 的文件名（如 app.8a3f2b.js）可安全缓存一年
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # 重复安全头：nginx 的 add_header 会覆盖上级块的同名头
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ---------- API 代理 ----------
        # 如果后端 API 运行在独立服务上，取消下方注释并修改地址
        # location /api {
        #     proxy_pass http://your-backend:3000;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # ---------- 禁止访问隐藏文件（.git、.env 等） ----------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}

# ============================================================
# Docker Compose 编排文件
# 启动: docker compose up -d
# 停止: docker compose down
# 重建: docker compose up -d --build
# 查看日志: docker compose logs -f
# ============================================================

services:
  web:
    # 从当前目录的 Dockerfile 构建镜像
    build:
      context: .
      dockerfile: Dockerfile

    # 构建后的镜像标签
    image: teaching-admin:latest

    container_name: teaching-admin

    # 异常退出时自动重启
    restart: unless-stopped

    # 宿主机 8080 → 容器内 Nginx 的 80 端口
    ports:
      - "8080:80"

    # 环境变量
    environment:
      - TZ=Asia/Shanghai

    # 日志轮转：防止日志文件无限增长占满磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # 健康检查（会覆盖 Dockerfile 中的 HEALTHCHECK）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # 加入自定义网络
    networks:
      - teaching-network

# ============================================================
# 自定义桥接网络（各容器间可通过容器名互相访问）
# ============================================================
networks:
  teaching-network:
    driver: bridge
